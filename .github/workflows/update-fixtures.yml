name: Update rugby fixtures

on:
  schedule:
    # Daily at 06:10 UTC / 01:10 Toronto standard time / 02:10 Toronto daylight time.
    - cron: '10 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: read

jobs:
  update-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update fixtures.json
        run: python3 scripts/update_fixtures.py

      - name: Commit fixture updates if changed
        run: |
          if git diff --quiet fixtures.json; then
            echo "No fixture changes."
            exit 0
          fi
          git config user.name "Herby fixture bot"
          git config user.email "299659379+Herby9000@users.noreply.github.com"
          git add fixtures.json
          git commit -m "chore: update rugby fixtures"
          git push
