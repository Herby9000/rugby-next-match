<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Rugby Next</title>
  <desc id="desc">Bright rugby goal posts under stadium lights on a black background</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="58%" r="75%">
      <stop offset="0" stop-color="#182028"/>
      <stop offset="0.5" stop-color="#080b0f"/>
      <stop offset="1" stop-color="#020304"/>
    </radialGradient>
    <linearGradient id="post" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.36" stop-color="#6ff7ff"/>
      <stop offset="1" stop-color="#14cde3"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d8f65" stop-opacity=".2"/>
      <stop offset="1" stop-color="#22d18b" stop-opacity=".5"/>
    </linearGradient>
    <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="28" result="wide"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="near"/>
      <feMerge><feMergeNode in="wide"/><feMergeNode in="near"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- stadium horizon -->
  <path d="M80 664 C264 600 760 600 944 664" fill="none" stroke="#ef1531" stroke-width="13" opacity=".62" filter="url(#redGlow)"/>
  <g fill="#ef1531" opacity=".6" filter="url(#redGlow)">
    <circle cx="174" cy="624" r="8"/><circle cx="255" cy="606" r="7"/><circle cx="350" cy="592" r="7"/>
    <circle cx="674" cy="592" r="7"/><circle cx="769" cy="606" r="7"/><circle cx="850" cy="624" r="8"/>
  </g>

  <!-- pitch and perspective markings -->
  <path d="M116 914 L390 650 H634 L908 914 Z" fill="url(#pitch)"/>
  <path d="M116 914 L390 650 M908 914 L634 650 M512 914 V650" fill="none" stroke="#70ffd0" stroke-width="8" opacity=".26"/>
  <path d="M252 800 H772 M354 706 H670" fill="none" stroke="#70ffd0" stroke-width="8" opacity=".22"/>

  <!-- unmistakable H-shaped rugby posts -->
  <g fill="none" stroke="url(#post)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" filter="url(#cyanGlow)">
    <path d="M328 782 V150"/>
    <path d="M696 782 V150"/>
    <path d="M328 486 H696"/>
  </g>

  <!-- crisp cores keep the posts readable at small sizes -->
  <g fill="none" stroke="#eaffff" stroke-width="15" stroke-linecap="round" stroke-linejoin="round">
    <path d="M328 782 V150"/>
    <path d="M696 782 V150"/>
    <path d="M328 486 H696"/>
  </g>

  <!-- post pads -->
  <path d="M282 756 Q328 724 374 756 V856 Q328 881 282 856 Z" fill="#e71630" stroke="#ff5265" stroke-width="8"/>
  <path d="M650 756 Q696 724 742 756 V856 Q696 881 650 856 Z" fill="#e71630" stroke="#ff5265" stroke-width="8"/>
  <path d="M304 785 H352 M672 785 H720" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity=".9"/>
</svg>
