<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Rugby Next</title>
  <desc id="desc">A neon red rugby ball with white laces on a black background</desc>
  <defs>
    <radialGradient id="bg" cx="42%" cy="32%" r="78%">
      <stop offset="0" stop-color="#17181d"/>
      <stop offset="0.55" stop-color="#08090c"/>
      <stop offset="1" stop-color="#020204"/>
    </radialGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5964"/>
      <stop offset="0.48" stop-color="#f10f2b"/>
      <stop offset="1" stop-color="#a90019"/>
    </linearGradient>
    <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="24" result="wide"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="near"/>
      <feMerge><feMergeNode in="wide"/><feMergeNode in="near"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="34" stdDeviation="28" flood-color="#000" flood-opacity=".9"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- restrained speed arcs -->
  <path d="M148 276 C270 130 474 82 656 130" fill="none" stroke="#50e8ff" stroke-width="18" stroke-linecap="round" opacity=".16"/>
  <path d="M872 748 C754 894 550 942 368 894" fill="none" stroke="#50e8ff" stroke-width="11" stroke-linecap="round" opacity=".12"/>

  <g transform="rotate(-24 512 512)" filter="url(#softShadow)">
    <!-- ball body and electric outline -->
    <path d="M184 512 C273 310 751 310 840 512 C751 714 273 714 184 512 Z" fill="#0c0d11" stroke="#f10f2b" stroke-width="34" filter="url(#redGlow)"/>
    <path d="M207 512 C291 342 733 342 817 512 C733 682 291 682 207 512 Z" fill="#101116" stroke="url(#red)" stroke-width="13"/>
    <path d="M251 512 C329 390 695 390 773 512 C695 634 329 634 251 512 Z" fill="none" stroke="#ffffff" stroke-width="5" opacity=".32"/>

    <!-- end seams -->
    <path d="M292 388 C330 462 330 562 292 636" fill="none" stroke="#f10f2b" stroke-width="15" stroke-linecap="round" opacity=".86"/>
    <path d="M732 388 C694 462 694 562 732 636" fill="none" stroke="#f10f2b" stroke-width="15" stroke-linecap="round" opacity=".86"/>

    <!-- white center seam and laces -->
    <path d="M390 512 H634" fill="none" stroke="#f7f8fb" stroke-width="22" stroke-linecap="round"/>
    <g stroke="#f7f8fb" stroke-width="20" stroke-linecap="round">
      <path d="M424 472 V552"/>
      <path d="M468 464 V560"/>
      <path d="M512 460 V564"/>
      <path d="M556 464 V560"/>
      <path d="M600 472 V552"/>
    </g>

    <!-- crisp highlight -->
    <path d="M337 402 C420 354 597 348 690 382" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity=".42"/>
  </g>

  <!-- small tracker pulse -->
  <circle cx="806" cy="245" r="10" fill="#50e8ff"/>
  <circle cx="806" cy="245" r="30" fill="none" stroke="#50e8ff" stroke-width="5" opacity=".28"/>
</svg>
